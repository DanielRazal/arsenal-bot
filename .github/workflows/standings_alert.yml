name: Standings Alert

on:
  schedule:
    # Every 6 hours — standings update after matches finish.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

concurrency:
  group: standings-alert
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore standings state
        uses: actions/cache@v4
        with:
          path: .standings_state.json
          key: standings-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            standings-state-

      - name: Check standings
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m scripts.run_standings_alert_once
