name: CI

# Runs the test suite on every push/PR. This is the one ACTIVE workflow
# (the per-job cron workflows are *.yml.disabled — the bot runs on Render).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q
        env:
          FOOTBALL_DATA_API_KEY: test
          TELEGRAM_BOT_TOKEN: test
          TELEGRAM_CHAT_ID: test
          DISCORD_WEBHOOK_URL: test
          GROQ_API_KEY: test

  # Security scans on every push/PR, in parallel with tests.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install scan tools
        run: pip install pip-audit bandit
      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt
      - name: Static security scan (bandit)
        run: bandit -r src scripts -ll

# Deploy gating is handled natively by Render: the service's Auto-Deploy is set
# to "After CI Checks Pass", so Render deploys a commit only once these test +
# security jobs report green. No deploy hook needed here.
